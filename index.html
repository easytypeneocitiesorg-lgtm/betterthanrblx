<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Simple Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #adminTriggerBtn {
    position: fixed;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    background-color: #3b82f6;
    cursor: pointer;
    z-index: 9999;
    opacity: 0.8;
  }
  #adminTriggerBtn:hover {
    opacity: 1;
  }
  header {
    padding: 12px 16px;
    background: #111827;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    padding-left: 32px;
  }
  #changeUsernameBtn {
    cursor: pointer;
    color: #93c5fd;
  }
  #changeUsernameBtn:hover {
    text-decoration: underline;
  }
  #pfp {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    border: 2px solid #3b82f6;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .message {
    margin-bottom: 12px;
    padding: 8px 10px;
    background: #1f2937;
    border-radius: 6px;
    display: flex;
    gap: 10px;
  }
  .pfpMsg {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .meta {
    font-size: 14px;
    font-weight: 600;
    color: #e5e7eb;
  }
  .timeSmall {
    font-size: 11px;
    color: #9ca3af;
    margin-left: 6px;
  }
  .replyPreview {
    background: #1f2937;
    padding: 6px 10px;
    border-left: 3px solid #3b82f6;
    margin-bottom: 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .replyText {
    font-size: 13px;
    color: #9ca3af;
  }
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }
  .replyBtn, .adminBtn {
    font-size: 12px;
    color: #93c5fd;
    cursor: pointer;
  }
  .adminBtn {
    color: #ef4444;
  }
  .replyBtn:hover, .adminBtn:hover {
    text-decoration: underline;
  }
  form {
    display: flex;
    flex-direction: column;
    padding: 10px 16px;
    background: #111827;
    gap: 8px;
  }
  #typingIndicator {
    font-size: 12px;
    color: #9ca3af;
    height: 14px;
  }
  .inputRow {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 8px 10px;
    border-radius: 4px;
    border: none;
    outline: none;
    font-size: 14px;
  }
  button {
    padding: 8px 14px;
    border-radius: 4px;
    border: none;
    background: #3b82f6;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  #usernameModal {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #usernameBox {
    background: #111827;
    padding: 20px 18px;
    border-radius: 8px;
    width: 260px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }
  #usernameBox h2 {
    margin: 0 0 10px;
    font-size: 16px;
  }
  #usernameBox label {
    font-size: 12px;
    color: #9ca3af;
  }
  #usernameInput {
    width: 100%;
    margin-top: 4px;
    margin-bottom: 12px;
    padding: 8px 10px;
    border-radius: 4px;
    border: none;
    outline: none;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="adminTriggerBtn" title="Admin Portal"></div>

<div id="usernameModal">
  <div id="usernameBox">
    <h2>Enter your username</h2>
    <label for="usernameInput">Username (max 26 chars)</label>
    <input id="usernameInput" type="text" maxlength="26" />
    <button id="saveUsernameBtn">Save</button>
  </div>
</div>

<header>
  <div id="changeUsernameBtn">Change Username</div>
  <div id="pfp"></div>
</header>

<main id="messages"></main>

<form id="messageForm">
  <div id="replyContainer"></div>
  <div id="typingIndicator"></div>

  <div class="inputRow">
    <input id="messageInput" type="text" placeholder="Type a message..." maxlength="1500" autocomplete="off" />
    <input id="fileInput" type="file" style="display:none" />
    <button id="uploadBtn" type="button">📎</button>
    <button id="sendBtn" type="submit">Send</button>
  </div>
</form>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
    authDomain: "multiplayerfps-c3b14.firebaseapp.com",
    databaseURL: "https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",
    projectId: "multiplayerfps-c3b14",
    storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
    messagingSenderId: "77451030161",
    appId: "1:77451030161:web:fa510ba2bd508e63491930",
    measurementId: "G-8LRSKGM40R"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    onChildChanged,
    onChildRemoved,
    set,
    update,
    remove,
    onValue,
    get
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");
  const typingRef = ref(db, "typing");

  const usernameModal = document.getElementById("usernameModal");
  const usernameInput = document.getElementById("usernameInput");
  const saveUsernameBtn = document.getElementById("saveUsernameBtn");
  const changeUsernameBtn = document.getElementById("changeUsernameBtn");
  const messagesEl = document.getElementById("messages");
  const messageForm = document.getElementById("messageForm");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");
  const typingIndicator = document.getElementById("typingIndicator");
  const replyContainer = document.getElementById("replyContainer");
  const pfpEl = document.getElementById("pfp");
  const adminTriggerBtn = document.getElementById("adminTriggerBtn");

  // Generate or pull a unique persistent user identifier
  let userId = localStorage.getItem("chat_userid");
  if (!userId) {
    userId = "usr_" + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    localStorage.setItem("chat_userid", userId);
  }

  let username = null;
  let cooldown = false;
  let typingTimeout = null;
  let replyTo = null;
  let isAdmin = false;

  const defaultPfp = "https://i.imgur.com/4ZQZ4ZQ.png";
  let pfp = localStorage.getItem("chat_pfp") || defaultPfp;
  pfpEl.style.backgroundImage = `url('${pfp}')`;

  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  // --- Live Synchronization for Profile Restrictions ---
  // Listens directly to this user's node. If an admin updates it, it locks locally.
  onValue(ref(db, `users/${userId}`), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      if (data.username) {
        username = data.username;
        localStorage.setItem("chat_username", username);
      }
      if (data.pfp) {
        pfp = data.pfp;
        localStorage.setItem("chat_pfp", pfp);
        pfpEl.style.backgroundImage = `url('${pfp}')`;
      }
    }
  });

  // --- Secure Admin Activation & Validation System ---
  async function checkAdminStatusOnLoad() {
    const savedCode = localStorage.getItem("admin_code");
    if (!savedCode) return;

    try {
      const response = await fetch("admincodes.txt");
      if (!response.ok) throw new Error("Could not check codes file");
      const text = await response.text();
      const validCodes = text.split(/\r?\n/).map(c => c.trim()).filter(Boolean);

      // Verify the code still exists in admincodes.txt
      if (validCodes.includes(savedCode)) {
        // Double check database ownership integrity
        const dbCheck = await get(ref(db, `used_codes/${savedCode}`));
        if (dbCheck.exists() && dbCheck.val().claimedBy === userId) {
          isAdmin = true;
          renderAllMessages();
          return;
        }
      }
      
      // Revoke status if validation fails
      localStorage.removeItem("admin_code");
      isAdmin = false;
      alert("Your admin code has been deleted either because your powers have been revoked or because of an error. If you believe this is an error please contact the owner at https://discord.gg/wZNGASwP3Y");
      renderAllMessages();
    } catch (err) {
      console.error("Verification delay or file offline:", err);
    }
  }

  adminTriggerBtn.addEventListener("click", async () => {
    const codeInput = prompt("Enter Admin Code:");
    if (!codeInput) return;
    const sanitizedCode = codeInput.trim();

    try {
      const response = await fetch("admincodes.txt");
      if (!response.ok) {
        alert("Error loading verification file.");
        return;
      }
      const text = await response.text();
      const validCodes = text.split(/\r?\n/).map(c => c.trim()).filter(Boolean);

      if (validCodes.includes(sanitizedCode)) {
        // Query Firebase to verify if this code has already been locked to another user ID
        const codeRef = ref(db, `used_codes/${sanitizedCode}`);
        const snapshot = await get(codeRef);

        if (snapshot.exists()) {
          const binding = snapshot.val();
          if (binding.claimedBy !== userId) {
            alert("This code has already been used by another user.");
            return;
          }
        } else {
          // Permanently lock this code to this specific User ID inside the database
          await set(codeRef, { claimedBy: userId });
        }

        localStorage.setItem("admin_code", sanitizedCode);
        isAdmin = true;
        alert("Admin status unlocked successfully!");
        renderAllMessages();
      } else {
        alert("Invalid admin code.");
      }
    } catch (err) {
      alert("Verification system failed connection.");
    }
  });

  let messageSnapshots = {};

  function renderAllMessages() {
    messagesEl.innerHTML = "";
    Object.keys(messageSnapshots).forEach(key => {
      displayMessage(key, messageSnapshots[key]);
    });
  }

  // --- End Admin Logic System ---

  function loadUsername() {
    const stored = localStorage.getItem("chat_username");
    if (stored && stored.trim() !== "") {
      username = stored;
      usernameModal.style.display = "none";
      // Push initial setup to sync global records
      update(ref(db, `users/${userId}`), { username, pfp });
    } else {
      usernameModal.style.display = "flex";
    }
  }

  saveUsernameBtn.addEventListener("click", () => {
    const value = usernameInput.value.trim();
    if (!value) return;
    username = value.slice(0, 26);
    localStorage.setItem("chat_username", username);
    update(ref(db, `users/${userId}`), { username });
    usernameModal.style.display = "none";
  });

  usernameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveUsernameBtn.click();
  });

  loadUsername();
  checkAdminStatusOnLoad();

  changeUsernameBtn.addEventListener("click", () => {
    usernameModal.style.display = "flex";
  });

  pfpEl.addEventListener("click", () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        pfp = reader.result;
        localStorage.setItem("chat_pfp", pfp);
        pfpEl.style.backgroundImage = `url('${pfp}')`;
        update(ref(db, `users/${userId}`), { pfp });
      };
      reader.readAsDataURL(file);
    };

    input.click();
  });

  messageInput.addEventListener("input", () => {
    if (username) set(ref(db, "typing/" + username), true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      if (username) set(ref(db, "typing/" + username), false);
    }, 1000);
  });

  onValue(typingRef, (snapshot) => {
    const typingUsers = snapshot.val() || {};
    const active = Object.keys(typingUsers).filter(u => typingUsers[u] && u !== username);
    typingIndicator.textContent = active.length > 0 ? active.join(", ") + " is typing..." : "";
  });

  function showReplyPreview(user, text) {
    replyTo = { user, text };
    replyContainer.innerHTML = `
      <div class="replyPreview">
        Replying to <b>${user}</b><br>
        <span class="replyText">> ${text}</span>
      </div>
    `;
  }

  function clearReplyPreview() {
    replyTo = null;
    replyContainer.innerHTML = "";
  }

  function displayMessage(key, data) {
    const msgEl = document.createElement("div");
    msgEl.className = "message";
    msgEl.setAttribute("data-key", key);

    const pfpMsg = document.createElement("div");
    pfpMsg.className = "pfpMsg";
    pfpMsg.style.backgroundImage = `url('${data.pfp || defaultPfp}')`;

    const content = document.createElement("div");
    const time = new Date(data.timestamp || Date.now());
    const timeStr = time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const metaEl = document.createElement("div");
    metaEl.className = "meta";
    metaEl.innerHTML = `${data.username}<span class="timeSmall">${timeStr}</span>`;
    content.appendChild(metaEl);

    if (data.replyUser && data.replyText) {
      const replyBox = document.createElement("div");
      replyBox.className = "replyPreview";
      replyBox.innerHTML = `
        Replying to <b>${data.replyUser}</b><br>
        <span class="replyText">> ${data.replyText}</span>
      `;
      content.appendChild(replyBox);
    }

    if (data.fileBase64) {
      const type = data.fileType || "";
      if (type.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = data.fileBase64;
        img.style.maxWidth = "300px";
        img.style.borderRadius = "6px";
        img.style.marginTop = "6px";
        content.appendChild(img);
      } else if (type.startsWith("video/")) {
        const vid = document.createElement("video");
        vid.src = data.fileBase64;
        vid.controls = true;
        vid.style.maxWidth = "300px";
        vid.style.borderRadius = "6px";
        vid.style.marginTop = "6px";
        content.appendChild(vid);
      } else if (type.startsWith("audio/")) {
        const aud = document.createElement("audio");
        aud.src = data.fileBase64;
        aud.controls = true;
        aud.style.marginTop = "6px";
        content.appendChild(aud);
      } else {
        const link = document.createElement("a");
        link.href = data.fileBase64;
        link.download = data.fileName;
        link.textContent = `📄 ${data.fileName}`;
        link.style.color = "#93c5fd";
        link.style.textDecoration = "none";
        content.appendChild(link);
      }
    } else {
      const textEl = document.createElement("div");
      textEl.className = "text";
      textEl.textContent = data.text;
      content.appendChild(textEl);
    }

    const actionRow = document.createElement("div");
    actionRow.className = "action-row";

    const replyBtn = document.createElement("div");
    replyBtn.className = "replyBtn";
    replyBtn.textContent = "Reply";
    replyBtn.onclick = () => {
      showReplyPreview(data.username, data.text || data.fileName || "");
    };
    actionRow.appendChild(replyBtn);

    if (isAdmin) {
      const targetUserId = data.userId;

      const resetPfpBtn = document.createElement("div");
      resetPfpBtn.className = "adminBtn";
      resetPfpBtn.textContent = "Reset PFP";
      resetPfpBtn.onclick = () => {
        if (targetUserId) {
          // Updates the structural User settings node permanently
          update(ref(db, `users/${targetUserId}`), { pfp: defaultPfp });
          // Changes the current clicked snapshot immediately
          update(ref(db, `messages/${key}`), { pfp: defaultPfp });
        }
      };

      const resetUserBtn = document.createElement("div");
      resetUserBtn.className = "adminBtn";
      resetUserBtn.textContent = "Reset Username";
      resetUserBtn.onclick = () => {
        if (targetUserId) {
          // Updates the global structural account configuration
          update(ref(db, `users/${targetUserId}`), { username: "username_deleted" });
          // Fixes current rendering element directly
          update(ref(db, `messages/${key}`), { username: "username_deleted" });
        }
      };

      const deleteBtn = document.createElement("div");
      deleteBtn.className = "adminBtn";
      deleteBtn.textContent = "Delete";
      deleteBtn.onclick = () => {
        remove(ref(db, `messages/${key}`));
      };

      actionRow.appendChild(resetPfpBtn);
      actionRow.appendChild(resetUserBtn);
      actionRow.appendChild(deleteBtn);
    }

    content.appendChild(actionRow);
    msgEl.appendChild(pfpMsg);
    msgEl.appendChild(content);
    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  onChildAdded(messagesRef, (snapshot) => {
    const data = snapshot.val();
    const key = snapshot.key;
    messageSnapshots[key] = data;
    displayMessage(key, data);

    if (data.username !== username && Notification.permission === "granted") {
      let body = data.text || "";
      if (data.fileBase64) {
        body = data.fileType.startsWith("image/") ? "Sent an image" : data.fileType.startsWith("video/") ? "Sent a video" : data.fileType.startsWith("audio/") ? "Sent an audio file" : `Sent a file: ${data.fileName}`;
      }
      new Notification(`${data.username}`, { body });
    }
  });

  onChildChanged(messagesRef, (snapshot) => {
    const key = snapshot.key;
    messageSnapshots[key] = snapshot.val();
    renderAllMessages();
  });

  onChildRemoved(messagesRef, (snapshot) => {
    const key = snapshot.key;
    delete messageSnapshots[key];
    renderAllMessages();
  });

  messageForm.addEventListener("submit", (e) => {
    e.preventDefault();
    if (cooldown) return;

    const text = messageInput.value.trim();
    if (!text && !replyTo) return;

    cooldown = true;
    sendBtn.disabled = true;
    setTimeout(() => {
      cooldown = false;
      sendBtn.disabled = false;
    }, 1000);

    push(messagesRef, {
      userId, // Message metadata now tracks user identification persistently
      username,
      text,
      pfp,
      replyUser: replyTo?.user || null,
      replyText: replyTo?.text || null,
      timestamp: Date.now()
    });

    messageInput.value = "";
    clearReplyPreview();
    messageInput.focus();
  });

  uploadBtn.addEventListener("click", () => {
    fileInput.click();
  });

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file || !username) return;

    if (file.size > 5 * 1024 * 1024) {
      alert("File too large! Max size is 5 MB.");
      fileInput.value = "";
      return;
    }

    if (cooldown) return;
    cooldown = true;
    sendBtn.disabled = true;
    setTimeout(() => {
      cooldown = false;
      sendBtn.disabled = false;
    }, 1000);

    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result;

      push(messagesRef, {
        userId,
        username,
        pfp,
        fileName: file.name,
        fileType: file.type,
        fileBase64: base64,
        replyUser: replyTo?.user || null,
        replyText: replyTo?.text || null,
        timestamp: Date.now()
      });

      clearReplyPreview();
    };
    reader.readAsDataURL(file);
    fileInput.value = "";
  });
</script>

</body>
</html>
