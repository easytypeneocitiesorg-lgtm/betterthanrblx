<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Simple Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 12px 16px;
    background: #111827;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }
  #changeUsernameBtn {
    cursor: pointer;
    color: #93c5fd;
  }
  #changeUsernameBtn:hover {
    text-decoration: underline;
  }
  #pfp {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    border: 2px solid #3b82f6;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .message {
    margin-bottom: 12px;
    padding: 8px 10px;
    background: #1f2937;
    border-radius: 6px;
    display: flex;
    gap: 10px;
  }
  .pfpMsg {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .meta {
    font-size: 14px;
    font-weight: 600;
    color: #e5e7eb;
  }
  .timeSmall {
    font-size: 11px;
    color: #9ca3af;
    margin-left: 6px;
  }
  .replyPreview {
    background: #1f2937;
    padding: 6px 10px;
    border-left: 3px solid #3b82f6;
    margin-bottom: 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .replyText {
    font-size: 13px;
    color: #9ca3af;
  }
  .replyBtn {
    font-size: 12px;
    color: #93c5fd;
    cursor: pointer;
    margin-top: 4px;
  }
  .replyBtn:hover {
    text-decoration: underline;
  }
  form {
    display: flex;
    flex-direction: column;
    padding: 10px 16px;
    background: #111827;
    gap: 8px;
  }
  #typingIndicator {
    font-size: 12px;
    color: #9ca3af;
    height: 14px;
  }
  .inputRow {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 8px 10px;
    border-radius: 4px;
    border: none;
    outline: none;
    font-size: 14px;
  }
  button {
    padding: 8px 14px;
    border-radius: 4px;
    border: none;
    background: #3b82f6;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  #usernameModal {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #usernameBox {
    background: #111827;
    padding: 20px 18px;
    border-radius: 8px;
    width: 260px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }
  #usernameBox h2 {
    margin: 0 0 10px;
    font-size: 16px;
  }
  #usernameBox label {
    font-size: 12px;
    color: #9ca3af;
  }
  #usernameInput {
    width: 100%;
    margin-top: 4px;
    margin-bottom: 12px;
    padding: 8px 10px;
    border-radius: 4px;
    border: none;
    outline: none;
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- Username modal -->
<div id="usernameModal">
  <div id="usernameBox">
    <h2>Enter your username</h2>
    <label for="usernameInput">Username (max 26 chars)</label>
    <input id="usernameInput" type="text" maxlength="26" />
    <button id="saveUsernameBtn">Save</button>
  </div>
</div>

<header>
  <div id="changeUsernameBtn">Change Username</div>
  <div id="pfp"></div>
</header>

<main id="messages"></main>

<form id="messageForm">
  <div id="replyContainer"></div>
  <div id="typingIndicator"></div>

  <div class="inputRow">
    <input id="messageInput" type="text" placeholder="Type a message..." maxlength="1500" autocomplete="off" />
    <input id="fileInput" type="file" style="display:none" />
    <button id="uploadBtn" type="button">📎</button>
    <button id="sendBtn" type="submit">Send</button>
  </div>
</form>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyCPcprDqf0X1rMOCe3R7GgVCBMXX7-L66U",
    authDomain: "multiplayerfps-c3b14.firebaseapp.com",
    databaseURL: "https://multiplayerfps-c3b14-default-rtdb.firebaseio.com",
    projectId: "multiplayerfps-c3b14",
    storageBucket: "multiplayerfps-c3b14.firebasestorage.app",
    messagingSenderId: "77451030161",
    appId: "1:77451030161:web:fa510ba2bd508e63491930",
    measurementId: "G-8LRSKGM40R"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    set,
    onValue
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");
  const typingRef = ref(db, "typing");

  const usernameModal = document.getElementById("usernameModal");
  const usernameInput = document.getElementById("usernameInput");
  const saveUsernameBtn = document.getElementById("saveUsernameBtn");

  const changeUsernameBtn = document.getElementById("changeUsernameBtn");

  const messagesEl = document.getElementById("messages");
  const messageForm = document.getElementById("messageForm");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");

  const typingIndicator = document.getElementById("typingIndicator");
  const replyContainer = document.getElementById("replyContainer");

  const pfpEl = document.getElementById("pfp");

  let username = null;
  let cooldown = false;
  let typingTimeout = null;
  let replyTo = null;

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  }

  function formatUsername(username) {
    let safe=escapeHTML(username);
    safe=safe.replace(/&lt;b&gt;/gi,"<b>").replace(/&lt;\/b&gt;/gi,"</b>");
    safe=safe.replace(/&lt;strong&gt;/gi,"<strong>").replace(/&lt;\/strong&gt;/gi,"</strong>");
    safe=safe.replace(/&lt;span\s+style=&quot;color:\s*([#a-zA-Z0-9(),.%\s-]+)&quot;&gt;/gi,
      (_,c)=>`<span style="color:${c}">`);
    safe=safe.replace(/&lt;\/span&gt;/gi,"</span>");
    return safe;
  }


  const defaultPfp = "https://i.imgur.com/4ZQZ4ZQ.png";
  let pfp = localStorage.getItem("chat_pfp") || defaultPfp;
  pfpEl.style.backgroundImage = `url('${pfp}')`;

  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  function loadUsername() {
    const stored = localStorage.getItem("chat_username");
    if (stored && stored.trim() !== "") {
      username = stored;
      usernameModal.style.display = "none";
    } else {
      usernameModal.style.display = "flex";
    }
  }

  saveUsernameBtn.addEventListener("click", () => {
    const value = usernameInput.value.trim();
    if (!value) return;
    username = value.slice(0, 26);
    localStorage.setItem("chat_username", username);
    usernameModal.style.display = "none";
  });

  usernameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveUsernameBtn.click();
  });

  loadUsername();

  changeUsernameBtn.addEventListener("click", () => {
    usernameModal.style.display = "flex";
  });

  pfpEl.addEventListener("click", () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        pfp = reader.result;
        localStorage.setItem("chat_pfp", pfp);
        pfpEl.style.backgroundImage = `url('${pfp}')`;
      };
      reader.readAsDataURL(file);
    };

    input.click();
  });

  // Typing indicator
  messageInput.addEventListener("input", () => {
    set(ref(db, "typing/" + username), true);

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      set(ref(db, "typing/" + username), false);
    }, 1000);
  });

  onValue(typingRef, (snapshot) => {
    const typingUsers = snapshot.val() || {};
    const active = Object.keys(typingUsers).filter(u => typingUsers[u] && u !== username);

    typingIndicator.textContent = active.length > 0
      ? active.join(", ") + " is typing..."
      : "";
  });

  // Reply system
  function showReplyPreview(user, text) {
    replyTo = { user, text };

    replyContainer.innerHTML = `
      <div class="replyPreview">
        Replying to ${formatUsername(user)}<br>
        <span class="replyText">> ${text}</span>
      </div>
    `;
  }

  function clearReplyPreview() {
    replyTo = null;
    replyContainer.innerHTML = "";
  }

  onChildAdded(messagesRef, (snapshot) => {
    const data = snapshot.val();

    const msgEl = document.createElement("div");
    msgEl.className = "message";

    const pfpMsg = document.createElement("div");
    pfpMsg.className = "pfpMsg";
    pfpMsg.style.backgroundImage = `url('${data.pfp || defaultPfp}')`;

    const content = document.createElement("div");

    const time = new Date(data.timestamp || Date.now());
    const timeStr = time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const metaEl = document.createElement("div");
    metaEl.className = "meta";
    metaEl.innerHTML = `${formatUsername(data.username)}<span class="timeSmall">${timeStr}</span>`;

    content.appendChild(metaEl);

    // Reply display
    if (data.replyUser && data.replyText) {
      const replyBox = document.createElement("div");
      replyBox.className = "replyPreview";
      replyBox.innerHTML = `
        Replying to ${formatUsername(data.replyUser)}<br>
        <span class="replyText">> ${data.replyText}</span>
      `;
      content.appendChild(replyBox);
    }

    // File display
    if (data.fileBase64) {
      const type = data.fileType || "";

      if (type.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = data.fileBase64;
        img.style.maxWidth = "300px";
        img.style.borderRadius = "6px";
        img.style.marginTop = "6px";
        content.appendChild(img);

      } else if (type.startsWith("video/")) {
        const vid = document.createElement("video");
        vid.src = data.fileBase64;
        vid.controls = true;
        vid.style.maxWidth = "300px";
        vid.style.borderRadius = "6px";
        vid.style.marginTop = "6px";
        content.appendChild(vid);

      } else if (type.startsWith("audio/")) {
        const aud = document.createElement("audio");
        aud.src = data.fileBase64;
        aud.controls = true;
        aud.style.marginTop = "6px";
        content.appendChild(aud);

      } else {
        const link = document.createElement("a");
        link.href = data.fileBase64;
        link.download = data.fileName;
        link.textContent = `📄 ${data.fileName}`;
        link.style.color = "#93c5fd";
        link.style.textDecoration = "none";
        content.appendChild(link);
      }

    } else {
      const textEl = document.createElement("div");
      textEl.className = "text";
      textEl.textContent = data.text;
      content.appendChild(textEl);
    }

    // Reply button
    const replyBtn = document.createElement("div");
    replyBtn.className = "replyBtn";
    replyBtn.textContent = "Reply";
    replyBtn.onclick = () => {
      showReplyPreview(data.username, data.text || data.fileName || "");
    };
    content.appendChild(replyBtn);

    msgEl.appendChild(pfpMsg);
    msgEl.appendChild(content);

    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    if (data.username !== username && Notification.permission === "granted") {
      let body = data.text || "";
      if (data.fileBase64) {
        body = data.fileType.startsWith("image/")
          ? "Sent an image"
          : data.fileType.startsWith("video/")
          ? "Sent a video"
          : data.fileType.startsWith("audio/")
          ? "Sent an audio file"
          : `Sent a file: ${data.fileName}`;
      }
      new Notification(`${data.username}`, { body });
    }
  });

  messageForm.addEventListener("submit", (e) => {
    e.preventDefault();
    if (cooldown) return;

    const text = messageInput.value.trim();
    if (!text && !replyTo) return;

    cooldown = true;
    sendBtn.disabled = true;
    setTimeout(() => {
      cooldown = false;
      sendBtn.disabled = false;
    }, 1000);

    push(messagesRef, {
      username,
      text,
      pfp,
      replyUser: replyTo?.user || null,
      replyText: replyTo?.text || null,
      timestamp: Date.now()
    });

    messageInput.value = "";
    clearReplyPreview();
    messageInput.focus();
  });

  uploadBtn.addEventListener("click", () => {
    fileInput.click();
  });

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file || !username) return;

    if (file.size > 5 * 1024 * 1024) {
      alert("File too large! Max size is 5 MB.");
      fileInput.value = "";
      return;
    }

    if (cooldown) return;
    cooldown = true;
    sendBtn.disabled = true;
    setTimeout(() => {
      cooldown = false;
      sendBtn.disabled = false;
    }, 1000);

    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result;

      push(messagesRef, {
        username,
        pfp,
        fileName: file.name,
        fileType: file.type,
        fileBase64: base64,
        replyUser: replyTo?.user || null,
        replyText: replyTo?.text || null,
        timestamp: Date.now()
      });

      clearReplyPreview();
    };
    reader.readAsDataURL(file);

    fileInput.value = "";
  });
</script>

</body>
</html>
